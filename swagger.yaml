security:
  - x-api-key: []
components:
  securitySchemes:
    x-api-key:
      type: apiKey
      name: x-api-key
      in: header
  parameters:
    parameter.lang:
      name: lang
      description: Lingua
      in: path
      required: true
      schema:
        description: 'Lingua - disponibili: "it" - "en"'
        type: string
        enum:
          - it
          - en
    parameter.api_version:
      name: api_version
      description: Versione API
      in: path
      required: true
      schema:
        description: 'Versione API - disponibili: "v3"'
        type: string
        enum:
          - v3
  schemas:
    request.TimbraturaElenco:
      type: object
      oneOf:
        - required:
          - da
          - a
        - required:
          - ultima_modifica_da
          - ultima_modifica_a
      properties:
        da:
          type: string
          format: Y-m-d
          description: Data inizio range per filtro su data lavoro (ora_inizio)
        a:
          type: string
          format: Y-m-d
          description: Data fine range per filtro su data lavoro (ora_inizio)
        ultima_modifica_da:
          type: string
          format: Y-m-d
          description: Data inizio range per filtro su ultima modifica della timbratura
        ultima_modifica_a:
          type: string
          format: Y-m-d
          description: Data fine range per filtro su ultima modifica della timbratura
        tipo:
          type: integer
          enum:
            - 1
            - 2
          description: >-
            2 - timbrature (macrotimbrature); 1 - per sottotimbrature. Default:
            2
        dipendente:
          type: string
          description: Codice gestionale del dipendente
        cliente:
          type: string
          description: Codice gestionale del cliente
        attivita:
          type: string
          description: Codice gestionale attivita
        dipendenti_con_codice:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            0 tutti i dipendenti; 1 - solo dipendenti con codice gestionale
            compilato
        formato:
          type: integer
          enum:
            - 1
            - 2
          default: 1
          description: '1 orari in sessantesimi; 2 - orari in centesimi. Default: 1'
    schema.Allegato:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        file:
          type: string
          description: link per accedere al file. Valido 20 minuti
    schema.ProduttivitaTimbratura:
      type: object
      properties:
        id:
          type: integer
        descrizione:
          type: string
        codice_gestionale:
          type: string
          description: Codice utilizzato per l'integrazione con altri sistemi
        valore_tipo:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
          description: >-
            1 - intero; 2 - decimale; 3 - orario; 4 - testuale; 5 - nessun
            valore;
        costo_cliente:
          type: number
          description: >-
            Costo unitario produttivita al cliente riferito a questa specifica
            timbratura (può essere diverso dal default presente nell'elenco
            timbrature)
        costo_interno:
          type: number
          description: >-
            Costo unitario produttivita interno riferito a questa specifica
            timbratura (può essere diverso dal default presente nell'elenco
            timbrature)
        valore:
          oneOf:
            - type: string
            - type: number
            - type: integer
          nullable: true
          description: >-
            il valore della produttivita. A seconda del tipo di produttivita
            potrà essere una stringa, un intero o un numero decimale
    schema.Cliente:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        nome:
          type: string
        indirizzo:
          type: string
        citta:
          type: string
        cap:
          type: string
        piva:
          type: string
        email:
          type: string
        provincia:
          type: string
        stato:
          type: string
        codice_gestionale:
          type: string
          description: Codice utilizzato per l'integrazione con altri sistemi
        latitudine:
          type: string
        longitudine:
          type: string
        note:
          type: string
        archiviato:
          type: integer
          description: 1 - cliente archiviato; 0 - cliente attivo
        variazione_costo_cliente:
          type: number
          nullable: true
          format: float
          description: >-
            Variazione percentuale del costo orario del cliente (maggiorazione o
            sconto)
        contatto:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            nome:
              type: string
            cellulare:
              type: string
            email:
              type: string
    schema.Dipendente:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        nome:
          type: string
        cognome:
          type: string
        email:
          type: string
        telefono:
          type: string
          nullable: true
        cellulare:
          type: string
          nullable: true
        codice_gestionale:
          type: string
          nullable: true
          description: Codice utilizzato per l'integrazione con altri sistemi
        note:
          type: string
          nullable: true
        archiviato:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - dipendente archiviato; 0 - dipendente attivo
        data_cessazione:
          type: string
          nullable: true
          format: date
          description: >-
            Data in formato aaaa-mm-gg (Y-m-d). Data di cessazione del
            contratto. Il dipendente verrà archiviato automaticamente superata
            questa data
        costo_orario_interno:
          type: number
          nullable: true
          format: float
          description: Costo orario del dipendente all'azienda
        costo_orario_cliente:
          type: number
          nullable: true
          format: float
          description: Costo orario del dipendente al cliente
    schema.Attivita:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        descrizione:
          type: string
        codice_gestionale:
          type: string
          description: Codice utilizzato per l'integrazione con altri sistemi
        archiviato:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - attivita archiviata; 0 - attivita attiva
    schema.Accesso:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        nome:
          type: string
        cognome:
          type: string
        email:
          type: string
        telefono:
          type: string
        cellulare:
          type: string
        codice_gestionale:
          type: string
          description: Codice utilizzato per l'integrazione con altri sistemi
        note:
          type: string
        visualizzazione:
          type: integer
          enum:
            - 1
            - 2
            - 3
          description: 1 - Classica (Dipendente, attività, data e ora inizio, data e ora fine, totale intervento); 2 - Limitata 1 (Dipendente, attività, data e ora fine intervento); 3 - Limitata 2 (Attività, data inizio intervento);
        associa_tutti_clienti:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - può vedere tutti i clienti; 0 - può vedere solo i clienti associati
        esporta_lavoro_programmato:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - accesso cliente può esportare i lavori programmati; 0 - ccesso cliente NON può esportare i lavori programmati
    schema.Timbratura:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        ultima_modifica:
          type: string
          format: date-time
          description: Data e ora dell'ultima modifica della timbratura nel formato aaaa-mm-gg HH:mm:ss
        ora_inizio:
          type: string
          description: Data nel formato gg/mm/aaaa o:mm:ss
        ora_inizio_arrotondata:
          type: string
          description: Data nel formato gg/mm/aaaa o:mm:ss
        ora_fine:
          type: string
          description: Data nel formato gg/mm/aaaa o:mm:ss
        ore:
          oneOf:
            - type: string
            - type: number
        ore_arrotondate:
          oneOf:
            - type: string
            - type: number
        pausa:
          oneOf:
            - type: string
            - type: number
        ore_al_netto_della_pausa:
          oneOf:
            - type: string
            - type: number
        ore_arrotondate_al_netto_della_pausa:
          oneOf:
            - type: string
            - type: number
        ore_diurno:
          oneOf:
            - type: string
            - type: number
          nullable: true
        ore_notturno:
          oneOf:
            - type: string
            - type: number
          nullable: true
        ore_diurno_arrotondate:
          oneOf:
            - type: string
            - type: number
          nullable: true
        ore_notturno_arrotondate:
          oneOf:
            - type: string
            - type: number
          nullable: true
        latitudine_start:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
          nullable: true
        longitudine_start:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
          nullable: true
        latitudine_end:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
          nullable: true
        longitudine_end:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
          nullable: true
        indirizzo_start:
          type: string
          nullable: true
        cap_start:
          type: string
          nullable: true
        citta_start:
          type: string
          nullable: true
        provincia_start:
          type: string
          nullable: true
        stato_start:
          type: string
          nullable: true
        indirizzo_end:
          type: string
          nullable: true
        cap_end:
          type: string
          nullable: true
        citta_end:
          type: string
          nullable: true
        provincia_end:
          type: string
          nullable: true
        stato_end:
          type: string
          nullable: true
        tag_seriale_start:
          type: string
        tag_testo_start:
          type: string
        seriale_nfc_start:
          type: string
        tag_seriale_stop:
          type: string
        tag_testo_stop:
