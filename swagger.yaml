        ritorno:
          type: integer
          enum:
            - 0
            - 1
          description: 0 in caso di errore, 1 se operazione riuscita
        messaggi:
          type: array
          items:
            type: string
          description: Dettagli errore
        dati:
          type: object
          properties:
            attivita:
