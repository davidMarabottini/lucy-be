    request.OrarioLavorativoSincronizza:
      type: object
      oneOf:
        - required:
            - codice_gestionale_dipendente
        - required:
            - dipendente_id
      properties:
        codice_gestionale_dipendente:
          type: string
          description: Codice univoco del dipendente
        dipendente_id:
          type: integer
          description: Id del dipendente
        orario_lavorativo_trasferta_esclusa:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Nell'esportazione del foglio presenze,
            le ore associate al cliente di tipo trasferta non verranno sommate
            alle ore ordinarie per il calcolo degli straordinari.
        orario_lavorativo_gestione_automatica_rol:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Verranno impostate a ROL le ore di
            differenze tra l’orario lavorativo e le ore effettivamente lavorate.
        orario_lavorativo_pausa_retribuita:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Pause retribuite: viene creato
            automaticamente un permesso "Pausa retribuita" della durata indicata
            nei campi "Pausa"
        orario_lavorativo_non_scalare_pausa:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Non scalare pause automaticamente: utile
            se non viene timbrata la pausa e attivate le pause retribuite (verrà
            aggiunto al totale della giornata la pausa come giustificativo)
        orario_lavorativo_pausa_scala_da_straordinari:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Nell'esportazione del foglio presenze,
            le ore di pausa verranno scalate solo da eventuali straordinari.
        orario_lavorativo_banca_ore:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; Da cartellino e fogliopresenze sarà
            possibile accantonare gli straordinari in banca ore e poi utilizzare
            le ore accantonate per compensare timbrature inferiori all'orario
            lavorativo
        orario_lavorativo_approvazione_straordinari:
