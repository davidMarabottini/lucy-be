            schema:
              $ref: '#/components/schemas/request.TimbraturaElenco'
            example:
              da: '2022-09-01'
              a: '2022-09-30'
              tipo: 1
              dipendente: dip01
              cliente: cli01
              attivita: att01
              dipendenti_con_codice: 0
              formato: 1
      summary: Timbrature Elenco
