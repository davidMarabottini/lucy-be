        Ritorna una lista delle timbrature. È possibile utilizzare i parametri
        della richiesta per filtrare i risultati. I filtri disponibili sono:
        filtrare per data di lavoro (da/a) oppure per data di ultima modifica
        (ultima_modifica_da/ultima_modifica_a). Almeno uno dei due set di
        parametri deve essere fornito. È possibile combinarli per applicare
        entrambi i filtri contemporaneamente.
      responses:
        '200':
          description: Lista delle timbrature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response.TimbraturaElenco'
              example:
