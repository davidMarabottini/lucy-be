        timbratura_confermata:
          type: integer
          nullable: true
    response.TimbraturaElenco:
      type: object
      properties:
        ritorno:
          type: integer
          enum:
            - 0
            - 1
          description: 0 in caso di errore, 1 se operazione riuscita
        dati_totali:
          type: integer
          description: Totale timbrature restituite
        dati:
          type: object
          properties:
            timbratura:
              type: array
              items:
                $ref: '#/components/schemas/schema.Timbratura'
    response.errorResponse:
      type: object
      properties:
        ritorno:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - operazione andata a buon fine; 0 - operazione fallita
