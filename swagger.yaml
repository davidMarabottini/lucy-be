          enum:
            - 0
            - 1
          description: 'Esito della chiamata (1: successo, 0: errore)'
        messaggi:
          type: array
          items:
            type: string
          description: Eventuali messaggi
        dati:
          type: object
          properties:
            documento:
              type: array
              items:
                $ref: '#/components/schemas/schema.Documento'
    request.DocumentoSincronizza:
      type: object
      required:
        - data
        - tipo_id
        - associazione
        - avviso
        - documento
      allOf:
        - if:
            properties:
              associazione:
                const: 1
          then:
            required:
              - dipendente_id
        - if:
            properties:
              associazione:
                const: 2
          then:
            required:
              - gruppo_id
        - if:
            properties:
              associazione:
                const: 4
          then:
            required:
              - cliente_id
      properties:
        titolo:
          type: string
          description: Titolo del documento
        descrizione:
          type: string
          description: Descrizione del documento
          nullable: true
        data:
          type: string
          format: Y-m-d
          description: Data del documento
        attivo:
          type: integer
          enum:
            - 0
            - 1
          description: Indica se il documento è attivo (1) o non attivo (0)
          default: 1
        conferma_lettura:
          type: integer
          enum:
            - 0
            - 1
          description: Indica se è richiesta la conferma di lettura del documento
          default: 0
        tipo_id:
          type: integer
          description: >-
            [DEPRECATED] ID del tipo di documento (fare riferimento alla API
            documento_tipo_elenco)
        tipologie:
          type: string
          description: >-
            ID delle tipologie del documento separate da ","
        associazione:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
          description: >-
            Tipo di associazione. 1 - dipendente; 2- gruppo di dipendenti; 3 -
            tutti i dipendenti; 4 - cliente; 5 - tutti i clienti
        dipendente_id:
          type: integer
          description: ID del dipendente (obbligatorio se associazione = 1)
          nullable: true
        gruppo_id:
          type: integer
          description: ID del gruppo (obbligatorio se associazione = 2)
          nullable: true
        cliente_id:
          type: integer
          description: ID del cliente (obbligatorio se associazione = 4)
          nullable: true
        avviso:
          type: integer
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
          description: >-
            Impostazione avviso su app del dipendente. 1 - ad ogni start
            timbratura; 2 - ad ogni stop timbratura; 3 - ogni giorno; 4 - una
            sola volta; 5 - nessun avviso
        codice_gestionale:
          type: string
          description: >-
            Codice gestionale del documento. Se presente viene aggiornato il
            documento esistente
          nullable: true
        invia_notifica:
          type: integer
          enum:
            - 0
            - 1
          description: Indica se inviare una notifica dopo l'inserimento/modifica
          default: 0
        data_scadenza:
          type: string
          format: Y-m-d
          description: Data di scadenza del documento
          nullable: true
        data_stato_in_scadenza:
          type: string
          format: Y-m-d
          description: Data in cui il documento entra in stato "in scadenza". Se impostata, verrà inviata una notifica di scadenza
          nullable: true
        rinnovato_da_id:
          type: integer
          description: ID del documento da cui è stato rinnovato questo documento
          nullable: true
        storico_guid:
          type: string
          description: GUID univoco per tracciare lo storico delle versioni del documento
          nullable: true
        documento:
          type: string
          format: binary
          description: File del documento in formato PDF
    response.DocumentoSincronizza:
      type: object
      required:
        - ritorno
        - messaggi
        - dati
      properties:
        ritorno:
          type: integer
          enum:
            - 0
            - 1
          description: 'Esito della chiamata (1: successo, 0: errore)'
        messaggi:
          type: array
          items:
            type: string
          description: Eventuali messaggi
        dati:
          type: object
          properties:
            documento:
              $ref: '#/components/schemas/schema.Documento'
