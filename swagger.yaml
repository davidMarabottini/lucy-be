          description: Eventuali messaggi
        dati:
          type: object
          properties:
            cliente:
              type: array
              items:
                $ref: '#/components/schemas/schema.Cliente'
    request.DipendenteSincronizza:
      type: object
      oneOf:
        - oneOf:
            - properties:
                credenziali_automatiche:
                  const: 0
              required:
                - nome
                - cognome
                - username
                - password
                - email
              title: Inserisci dipendente con credenziali manuali
            - properties:
                credenziali_automatiche:
                  const: 1
              required:
                - nome
                - cognome
                - email
              title: Inserisci dipendente con credenziali automatiche
          title: Inserisci dipendente
        - anyOf:
            - required:
                - id
            - required:
                - codice_gestionale
          title: Modifica dipendente
      properties:
        id:
          type: integer
          description: >-
            ID del dipendente. Se specificato, verrà fatto un update dei dati
            esistenti. In alternativa è possibile usare codice_gestionale
        codice_gestionale:
          type: string
          description: >-
            Codice identificativo del dipendente. Se specificato e già presente
            un dipendente con questo codice verrà fatto un update dei dati
            esistenti. In alternativa è possibile usare id
        cognome:
          type: string
        nome:
          type: string
        telefono:
          type: string
        cellulare:
          type: string
        gruppo_id:
          type: integer
          enum:
            - 1
            - 3
            - 5
            - 7
            - 9
            - 10
          description: >-
            1 - Amministratore; 3 - Dipendente o collaboratore che timbra solo
            da app; 5 - Dipendente o collaboratore che timbra da app e da web; 7
            - Dipendente o collaboratore che timbra solo da app e visualizza da
            web le sue timbrature in sola lettura;  9 - Referente/responsabile
            di un gruppo; 10 - Dipendente o collaboratore che timbra solo da web
            e visualizza le sue timbrature in sola lettura; DEFAULT: 3
        badge:
          type: string
          description: Seriale del badge utilizzato per timbrare
        data_cessazione:
          type: string
          description: >-
            Data in formato aaaa-mm-gg (Y-m-d). Data di cessazione del
            contratto. Il dipendente verrà archiviato automaticamente superata
            questa data
        note:
          type: string
        codicefiscale:
          type: string
        email:
          type: string
        username:
          type: string
          description: >-
            Username per effettuare login. Deve essere univoco per ogni
            dipendente.
        password:
          type: string
        archiviato:
          type: integer
          description: 1 se attivita archiviata, 0 se attivita attiva
        arrotondamento_id:
          type: integer
          description: >-
            id dell'arrotondamento da applicare al dipendente. Default:
            arrotondamento di default (id: 1)
        credenziali_automatiche:
          type: integer
          description: >-
            1 le credenziali vengono generate automaticamente in fase di
            creazione del dipendente e non vengono modificate in fase di
            modifica | 0 le credenziali vanno create manualmente attraverso i
            parametri "username" e "password". In fase di modifica le
            credenziali vengono modificate.
        invia_email:
          type: integer
          description: >-
            1 in fase di creazione/modifica delle credenziali invia al
            dipendente una mail con i suoi dati di accesso | 0 non inviare mail
            al dipendente
        permesso_speciale_timbra_solo_con_tag:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.1) Il dipendente può timbrare solo con
            i tag NFC, Beacons e QR-CODE, i pulsanti START/STOP vengono nascosti
        permesso_speciale_note_in_timbratura:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.2) Il dipendente durante la timbratura
            può inserire note multiple
        permesso_speciale_no_foglio_intervento:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.3) Nascondi flag 'visualizza foglio
            intervento' presente dopo la timbratura
        permesso_speciale_solo_timbrare:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.4) Il dipendente può solo timbrare,
            non vedrà calendario, statistiche, clienti, Tag NFC/Beacon/QR-CODE
        permesso_speciale_obbliga_gps_attivo:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.5) Obbliga il dipendente ad avere il
            GPS attivo per timbrare
        permesso_speciale_timbra_web_temporeale:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.6) Timbra da web solo in tempo reale
            (ricordiamo che una timbratura deve essere aperta e chiusa con lo
            stesso sistema)
        permesso_speciale_attiva_dimenticato_start:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.7) Attiva il pulsante "Ho dimenticato
            di fare start"
        permesso_speciale_obbliga_attivita:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.8) Obbliga il dipendente ad indicare
            l'attività
        permesso_speciale_obbliga_produttivita:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.9) Obbliga il dipendente ad indicare
            la produttività
        permesso_speciale_obbliga_greenpass:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.10) Obbliga il dipendente ad avere il
            greenpass valido per timbrare
        permesso_speciale_invia_notifiche:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.12) Invia notifiche al dipendente
            tramite App Rilevazione Presenze
        permesso_speciale_gestione_tag:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.1) Il dipendente può gestire
            (aggiungere, eliminare, modificare) i tag NFC, Beacons e QR-CODE
            direttamente dall'app
        permesso_speciale_inserisci_nuovo_cliente:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.2) Il dipendente può inserire nuovi
            clienti direttamente dall'app
        permesso_speciale_modifica_timbratura_da_app:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.3) Permetti al dipendente di
            modificare dall'app: attività, descrizione e allegati delle
            timbrature fatte
        permesso_speciale_foglio_intervento_unico:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.4) L'utente può creare fogli
            interventi unici (raggruppare, in un unico foglio di intervento,
            timbrature di più interventi e/o dipendenti)
        permesso_speciale_chi_in_ufficio:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.5) Possibilità dal pannello web di
            generare un esportazione in Excel di chi è in ufficio o dal cliente
            (mostra per cliente chi ha effettuato l’ultima timbratura di entrata
            ma non ha fatto l’uscita)
        permesso_speciale_attiva_cartellino_app:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.6) Attiva visualizzazione cartellino
            da app
        permesso_speciale_attiva_cartellino_app_orari:
          type: integer
          enum:
            - 1
            - 2
          description: >-
            1 - arrotondati; 2 - precisi; Se attivo cartellino da app specifica
            quale tipo di orari visualizzare nel cartellino DEFAULT 2
        permesso_speciale_attiva_cartellino_app_orari_dipendente:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 2 - non attivo; Timbrature originali del dipendente senza modifiche apportate da altri
        permesso_speciale_piano_ferie_aziendale:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.7) Autorizza il dipendente a
            visualizzare il piano ferie aziendale
        permesso_speciale_timbrature_inserimento_massivo:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 2.8) Abilita timbrature inserimento
            massivo
        dipendente_escludi_in_grafico_presenze:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.1) Escludi l'utente dal grafico delle
            presenze in dashboard
        permesso_speciale_disattiva_login_app_rilevazione_presenze:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.2) Impedisci login tramite app
            rilevazione presenze
        permesso_speciale_disattiva_login_app_timbratirce_mobile:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.3) Impedisci login tramite app
            timbratrice mobile
        permesso_speciale_email_richiesta_permessi:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.4a) L'utente di tipo
            amministratore/referente di un gruppo riceverà l'email di richiesta
            permessi effettuate dai dipendenti
        permesso_speciale_email_scadenza_documenti:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.4b) L'utente di tipo 
            amministratore/referente di un gruppo riceverà l'email di notifica 
            documento in scadenza
        permesso_speciale_utente_congelato:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 3.5) L'utente è bloccato e non può
            timbrare, potrà fare richieste di permessi, note spesa e vedere i
            lavori schedulati
        dipendente_email_avviso_credito:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - attivo; 0 - non attivo; 3.6) Abilita email avviso credito
        permesso_speciale_cancellazione_timbrature_vecchie:
          type: integer
          description: >-
            valore numerico in giorni; 4) Cancella le timbrature, salvate sul
            dispositivo dell'utente, più vecchie di X giorno
        permesso_speciale_timbra_web_ip:
          type: string
          description: Indirizzo IP; 6) IP pubblico abilitato per timbrare (timbra da web)
        permesso_speciale_costo_orario_interno:
          type: number
          description: >-
            Valore numerico decimale (euro); Costo orario interno dipendente. Il
            punto decimale può essere espresso col carattere '.' o ','. Non
            utilizzare caratteri per separara le migliaia.
        permesso_speciale_costo_orario_cliente:
          type: number
          description: >-
            Valore numerico decimale (euro); Costo orario dipendente al cliente.
            Il punto decimale può essere espresso col carattere '.' o ','. Non
            utilizzare caratteri per separara le migliaia.
        dipendente_costo_chilometrico:
          type: number
          description: >-
            Valore numerico decimale (euro); Tariffa chilometrica dipendente. Il
            punto decimale può essere espresso col carattere '.' o ','. Non
            utilizzare caratteri per separara le migliaia.
        permesso_speciale_timbra_solo_con_targa:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.11) Il dipendente può timbrare solo
            con la targa del veicolo quando riconoscita dalla telecamera, i
            pulsanti START/STOP vengono nascosti
        permesso_speciale_geofence:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.13.1) Abilita timbrature di start con
            geofence
        permesso_speciale_geofence_stop:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.13.2) Abilita timbrature di stop con
            geofence
        permesso_speciale_open_descrizione_no:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.14) Non chiedere la descrizione
            dell'intervento dopo lo stop della timbratura
        permesso_speciale_pausa_manuale:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.15) Permetti al dipendente di inserire
            le ore di pausa fatte durante la timbratura, la durata della pausa
            verrà richiesta nella fase di stop, raggiunte le 4 ore sulla
            giornata
        permesso_speciale_attiva_dimenticato_stop:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.17) Attiva la possibilità d'inviare al
            cliente il foglio intervento dall'app
        permesso_speciale_attiva_mail_foglio_intervento:
          type: integer
          enum:
            - 0
            - 1
          description: >-
            1 - attivo; 0 - non attivo; 1.18) Permetti al dipendente di indicare
            le indennità
        permesso_speciale_indennita_manuale:
          type: integer
          enum:
            - 0
            - 1
          description: 1 - attivo; 0 - non attivo
        cliente_id:
          type: array
          items:
            type: integer
          description: >-
            Lista degli id dei clienti associati al dipendente. È possibile
            mandare un array vuoto per eliminare tutte le associazioni con
            clienti di questo dipendente
        cliente_codice_gestionale:
          type: array
          items:
            type: string
          description: >-
            Lista dei codici gestionali dei clienti associati al dipendente. È
            possibile mandare un array vuoto per eliminare tutte le associazioni
            con clienti di questo dipendente
