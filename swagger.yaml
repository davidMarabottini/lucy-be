        indirizzo:
          type: string
        citta:
          type: string
        provincia:
          type: string
        stato:
          type: string
          description: Stato del cliente
        cap:
          type: string
        piva:
          type: string
        telefono:
          type: string
        email:
          type: string
        latitudine:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
        longitudine:
          type: string
          description: Coordinate di geolocalizzazione in formato gradi decimali
        note:
          type: string
        contatto:
          type: string
          description: Nome del riferimento all'interno dell'azienda cliente
        contatto_cellulare:
          type: string
          description: Numero di telefono del riferimento all'interno dell'azienda cliente
        contatto_email:
          type: string
          description: Numero di telefono del riferimento all'interno dell'azienda cliente
        archiviato:
          type: integer
          description: 1 - cliente archiviato; 0 - cliente attivo
        dipendente_id:
          type: array
          items:
            type: integer
          description: >-
            Lista degli id dei dipendenti associati al cliente. È possibile
            mandare un array vuoto per eliminare tutte le associazioni con
            dipendenti di questo cliente
        dipendente_codice_gestionale:
          type: array
          items:
            type: string
          description: >-
            Lista dei codici gestionali dei dipendenti associati al cliente. È
            possibile mandare un array vuoto per eliminare tutte le associazioni
            con dipendenti di questo cliente
    response.ClienteSincronizza:
